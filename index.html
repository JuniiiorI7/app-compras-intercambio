<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPRAS — Câmbio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── VISUAL PADRÃO MANTIDO ────────────────────────────────────────────────── */
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --border: #2e2e2e; --border2: #3a3a3a;
  --text: #f0f0f0; --text2: #999; --text3: #666; --accent: #f59e0b; --accent2: #d97706;
  --blue: #3b82f6; --green: #10b981; --red: #ef4444; --orange: #f97316;
  --radius: 8px; --radius-lg: 12px; --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); margin: 0; padding: 0; line-height: 1.5; }
.app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.brand h1 { font-family: var(--mono); font-size: 1.5rem; margin: 0; }
.brand h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 12px; }
.btn { padding: 10px 20px; border-radius: var(--radius); border: none; font-family: var(--mono); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.dashboard-grid { display: grid; grid-template-columns: 1fr 350px; gap: 24px; }
@media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #111; padding: 4px; border-radius: 10px; }
.tab-btn { flex: 1; padding: 8px; border-radius: 6px; border: none; background: transparent; color: var(--text3); font-family: var(--mono); cursor: pointer; }
.tab-btn.active { background: var(--surface2); color: var(--text); }
.order-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.os-badge { font-family: var(--mono); color: var(--accent); background: rgba(245,158,11,0.1); padding: 2px 8px; border-radius: 4px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal-content { background: var(--surface); width: 95%; max-width: 600px; padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border2); }
.form-control { width: 100%; background: var(--bg); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: var(--radius); margin-bottom: 15px; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="brand"><h1>COMPRAS <span>/ CÂMBIO</span></h1></div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="openSettingsModal()" title="Gerenciar Nomes">⚙️</button>
      <button class="btn btn-primary" onclick="openModal()">+ Novo Pedido</button>
    </div>
  </header>

  <div class="dashboard-grid">
    <main>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pendente', this)">PENDENTES <span id="badge-pendente">0</span></button>
        <button class="tab-btn" onclick="switchTab('comprado', this)">COMPRADOS <span id="badge-comprado">0</span></button>
        <button class="tab-btn" onclick="switchTab('finalizado', this)">FINALIZADOS <span id="badge-finalizado">0</span></button>
      </div>
      <div id="orders-container"></div>
    </main>
    <aside>
        <div class="card">
            <h3 style="font-family: var(--mono); font-size: 0.9rem; color: var(--text2); margin-bottom: 15px;">RESUMO DO SISTEMA</h3>
            <div id="donut-legend"></div>
        </div>
    </aside>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 style="font-family: var(--mono); margin-bottom: 20px; color: var(--accent);">NOVA SOLICITAÇÃO</h2>
    <input type="text" id="form-os" class="form-control" placeholder="Número da O.S.">
    <label style="font-size: 0.7rem; color: var(--text2);">SOLICITANTE</label>
    <select id="form-solicitante" class="form-control"></select>
    <label style="font-size: 0.7rem; color: var(--text2);">CLIENTE</label>
    <select id="form-cliente" class="form-control"></select>
    <label style="font-size: 0.7rem; color: var(--text2);">URGÊNCIA</label>
    <select id="form-urgency" class="form-control">
        <option value="URGENTE HOJE">🔴 URGENTE HOJE</option>
        <option value="URGENTE">🟡 URGENTE</option>
        <option value="SEM URGÊNCIA" selected>🟢 SEM URGÊNCIA</option>
    </select>
    <input type="number" id="form-pecas" class="form-control" placeholder="Valor Total R$">
    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="saveOrder()">SALVAR PEDIDO</button>
  </div>
</div>

<div id="settings-modal" class="modal-overlay" onclick="closeSettingsModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 450px;">
      <h2 style="font-family: var(--mono); margin-bottom: 20px;">GERENCIAR NOMES</h2>
      <select id="edit-list-type" onchange="renderEditList()" class="form-control">
        <option value="solicitantes">Editar Solicitantes</option>
        <option value="clientes">Editar Clientes</option>
        <option value="fornecedores">Editar Fornecedores</option>
      </select>
      <div id="edit-list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
      <button class="btn btn-secondary" style="width: 100%;" onclick="closeSettingsModal()">FECHAR</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHUSjDVtoztWHaSkINsoI7EcYXoI1xt0o",
    authDomain: "compras-intercambio.firebaseapp.com",
    projectId: "compras-intercambio",
    storageBucket: "compras-intercambio.firebasestorage.app",
    messagingSenderId: "1007834002086",
    appId: "1:1007834002086:web:d1e112adf5d16e1473ba67"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let orders = [];
  let solicitantes = []; // ZERADO conforme pedido
  let clientes = [];     // ZERADO conforme pedido
  let fornecedores = []; // ZERADO conforme pedido
  let currentTab = 'pendente';

  // ── FIREBASE SYNC ────────────────────────────────────────────────────────
  onValue(ref(db, 'compras_v2/'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      orders = data.pedidos ? Object.entries(data.pedidos).map(([id, val]) => ({ id, ...val })) : [];
      solicitantes = data.listas?.solicitantes || [];
      clientes = data.listas?.clientes || [];
      fornecedores = data.listas?.fornecedores || [];
      renderAll();
    }
  });

  function persistLists() {
    set(ref(db, 'compras_v2/listas'), { solicitantes, clientes, fornecedores });
  }

  // ── FUNÇÕES DE MODAL ─────────────────────────────────────────────────────
  window.openModal = () => {
    document.getElementById('modal-overlay').classList.add('active');
    populateSelects();
  };
  window.closeModal = () => document.getElementById('modal-overlay').classList.remove('active');

  window.openSettingsModal = () => {
    document.getElementById('settings-modal').classList.add('active');
    renderEditList();
  };
  window.closeSettingsModal = () => document.getElementById('settings-modal').classList.remove('active');

  // ── GERENCIAMENTO DE NOMES ───────────────────────────────────────────────
  window.renderEditList = () => {
    const type = document.getElementById('edit-list-type').value;
    const container = document.getElementById('edit-list-container');
    const list = type === 'solicitantes' ? solicitantes : (type === 'clientes' ? clientes : fornecedores);

    container.innerHTML = list.map((name, index) => `
      <div style="display: flex; gap: 8px; margin-bottom: 8px;">
        <input type="text" class="form-control" value="${name}" onchange="updateName('${type}', ${index}, this.value)" style="margin-bottom:0;">
        <button class="btn" onclick="deleteName('${type}', ${index})" style="background:#ef4444; color:white; padding:5px 12px;">🗑️</button>
      </div>
    `).join('') + `
      <button class="btn btn-secondary" style="width:100%; margin-top:10px; border-style:dashed;" onclick="addNewName('${type}')">+ ADICIONAR NOVO</button>
    `;
  };

  window.addNewName = (type) => {
    const n = prompt("Novo nome:");
    if(n) {
        if(type === 'solicitantes') solicitantes.push(n);
        if(type === 'clientes') clientes.push(n);
        if(type === 'fornecedores') fornecedores.push(n);
        persistLists();
        renderEditList();
    }
  };

  window.updateName = (type, index, val) => {
    if(!val) return;
    if(type === 'solicitantes') solicitantes[index] = val;
    if(type === 'clientes') clientes[index] = val;
    if(type === 'fornecedores') fornecedores[index] = val;
    persistLists();
  };

  window.deleteName = (type, index) => {
    if(confirm("Excluir nome da lista?")) {
        if(type === 'solicitantes') solicitantes.splice(index, 1);
        if(type === 'clientes') clientes.splice(index, 1);
        if(type === 'fornecedores') fornecedores.splice(index, 1);
        persistLists();
        renderEditList();
    }
  };

  // ── PEDIDOS ──────────────────────────────────────────────────────────────
  window.saveOrder = () => {
    const os = document.getElementById('form-os').value;
    const sol = document.getElementById('form-solicitante').value;
    const cli = document.getElementById('form-cliente').value;
    const urg = document.getElementById('form-urgency').value;
    const val = document.getElementById('form-pecas').value;

    if(!os || sol === 'ADD') return alert("Preencha os campos corretamente.");

    const newOrder = {
      os, solicitante: sol, cliente: cli, urgencia: urg, valor: val || 0,
      status: 'pendente', data: new Date().toLocaleDateString()
    };

    push(ref(db, 'compras_v2/pedidos'), newOrder);
    closeModal();
    document.getElementById('form-os').value = '';
    document.getElementById('form-pecas').value = '';
  };

  window.moveOrder = (id, newStatus) => {
    update(ref(db, `compras_v2/pedidos/${id}`), { status: newStatus });
  };

  window.deleteOrder = (id) => {
    if(confirm("Apagar permanentemente?")) remove(ref(db, `compras_v2/pedidos/${id}`));
  };

  window.switchTab = (tab, btn) => {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  };

  function populateSelects() {
    const fill = (id, list) => {
      const el = document.getElementById(id);
      el.innerHTML = list.map(n => `<option value="${n}">${n}</option>`).join('') || '<option value="ADD">Cadastre na engrenagem ⚙️</option>';
    };
    fill('form-solicitante', solicitantes);
    fill('form-cliente', clientes);
  }

  function renderOrders() {
    const container = document.getElementById('orders-container');
    const filtered = orders.filter(o => o.status === currentTab);

    container.innerHTML = filtered.map(o => `
      <div class="order-item">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <span class="os-badge">OS ${o.os}</span>
                <span style="font-size:0.7rem; color:var(--text3); margin-left:10px;">${o.data}</span>
                <div style="margin-top:8px; font-weight:600;">🚛 ${o.cliente}</div>
                <div style="font-size:0.8rem; color:var(--text2);">Por: ${o.solicitante} · ${o.urgencia}</div>
            </div>
            <div style="text-align:right;">
                <div style="color:var(--accent); font-family:var(--mono); font-weight:600;">R$ ${parseFloat(o.valor).toFixed(2)}</div>
                <div style="margin-top:10px;">
                    <button onclick="deleteOrder('${o.id}')" style="background:none; border:none; color:var(--red); cursor:pointer; margin-right:10px;">🗑️</button>
                    ${o.status === 'pendente' ? `<button class="btn btn-secondary" style="padding:4px 10px; font-size:0.7rem;" onclick="moveOrder('${o.id}', 'comprado')">➔ COMPRADO</button>` : ''}
                    ${o.status === 'comprado' ? `<button class="btn btn-primary" style="padding:4px 10px; font-size:0.7rem;" onclick="moveOrder('${o.id}', 'finalizado')">➔ FINALIZAR</button>` : ''}
                </div>
            </div>
        </div>
      </div>
    `).join('') || '<p style="text-align:center; color:var(--text3); padding:20px;">Nada por aqui.</p>';
  }

  function renderAll() {
    renderOrders();
    document.getElementById('badge-pendente').innerText = orders.filter(o => o.status === 'pendente').length;
    document.getElementById('badge-comprado').innerText = orders.filter(o => o.status === 'comprado').length;
    document.getElementById('badge-finalizado').innerText = orders.filter(o => o.status === 'finalizado').length;
    
    document.getElementById('donut-legend').innerHTML = `
        <div style="font-size:0.85rem; color:var(--text2); display:flex; justify-content:space-between; margin-bottom:5px;"><span>TOTAL PEDIDOS:</span> <b>${orders.length}</b></div>
        <div style="height:4px; background:#333; border-radius:2px; overflow:hidden; display:flex;">
            <div style="width:${(orders.filter(o => o.status === 'pendente').length/orders.length)*100}%; background:var(--accent)"></div>
            <div style="width:${(orders.filter(o => o.status === 'comprado').length/orders.length)*100}%; background:var(--blue)"></div>
            <div style="width:${(orders.filter(o => o.status === 'finalizado').length/orders.length)*100}%; background:var(--green)"></div>
        </div>
    `;
  }
</script>
</body>
</html>
