<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPRAS — Câmbio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--border2:#3a3a3a;--text:#f0f0f0;--text2:#999;--text3:#666;--accent:#f59e0b;--accent2:#d97706;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f97316;--radius:8px;--radius-lg:12px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading-screen .spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen p{font-family:var(--mono);font-size:13px;color:var(--text2)}

/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-title{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;color:var(--accent);display:flex;align-items:center;gap:10px}
.app-title span{color:var(--text2);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-new{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:8px 16px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-new:hover{background:var(--accent2)}

/* TABS */
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text2);font-family:var(--mono)}
.tab-btn.active .tab-count{background:var(--accent);color:#000}

/* CONTENT */
.content{padding:20px;max-width:960px;margin:0 auto}
.section{display:none}
.section.active{display:block}

/* PILLS */
.urg-pills{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.urg-pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:6px}
.urg-pill.all.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.urg-pill.hoje.active{background:rgba(239,68,68,.15);color:var(--red);border-color:var(--red)}
.urg-pill.urgente.active{background:rgba(245,158,11,.15);color:var(--accent);border-color:var(--accent)}
.urg-pill.sem.active{background:rgba(16,185,129,.15);color:var(--green);border-color:var(--green)}
.pill-dot{width:7px;height:7px;border-radius:50%}

/* SEARCH */
.search-wrap{margin-bottom:16px;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px 9px 36px;color:var(--text);font-size:13px;font-family:var(--sans)}
.search-wrap input:focus{outline:none;border-color:var(--border2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* ORDER CARD */
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.order-card:hover{border-color:var(--border2)}
.order-card.urg-hoje{border-left:3px solid var(--red)}
.order-card.urg-urgente{border-left:3px solid var(--accent)}
.order-card.urg-sem{border-left:3px solid var(--green)}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.order-main{flex:1;min-width:0}
.order-company{font-weight:600;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.urg-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.05em;flex-shrink:0}
.urg-badge.hoje{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.urg-badge.urgente{background:rgba(245,158,11,.2);color:var(--accent);border:1px solid rgba(245,158,11,.3)}
.urg-badge.sem{background:rgba(16,185,129,.2);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.order-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.order-right{text-align:right;flex-shrink:0}
.order-value{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent)}
.order-date{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.order-items{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.item-tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--text2);font-family:var(--mono)}
.order-obs{font-size:12px;color:var(--text3);margin-bottom:8px;font-style:italic}
.frete-info{font-size:11px;color:var(--text3);font-family:var(--mono)}
.order-actions{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.action-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:5px}
.action-btn:hover{color:var(--text);border-color:var(--text3)}
.action-btn.advance{border-color:var(--blue);color:var(--blue)}
.action-btn.advance:hover{background:rgba(59,130,246,.1)}
.action-btn.finish{border-color:var(--green);color:var(--green)}
.action-btn.finish:hover{background:rgba(16,185,129,.1)}
.action-btn.del{border-color:rgba(239,68,68,.4);color:var(--red);margin-left:auto}
.action-btn.del:hover{background:rgba(239,68,68,.1)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:520px;padding:20px;margin:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600;font-family:var(--mono)}
.modal-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
.modal-close:hover{color:var(--text);background:var(--surface2)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.req{color:var(--red)}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;color:var(--text);font-size:13px;font-family:var(--sans);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field select option{background:var(--surface2)}
.field textarea{resize:vertical;min-height:60px}
.new-input{margin-top:6px;display:none}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ITEMS */
.items-input-row{display:flex;gap:6px;margin-bottom:8px}
.items-input-row input{flex:1}
.items-input-row .price-input{width:110px;flex:none}
.btn-add-item{padding:9px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--accent);font-size:13px;cursor:pointer;font-family:var(--sans);font-weight:500;white-space:nowrap;transition:background .15s}
.btn-add-item:hover{background:var(--border)}
.items-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.item-tag-form{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:12px;color:var(--text2);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.item-tag-form .item-price{color:var(--accent);font-size:11px}
.item-remove{cursor:pointer;color:var(--red);font-size:13px;opacity:.7;line-height:1}
.item-remove:hover{opacity:1}
.items-total{font-family:var(--mono);font-size:12px;color:var(--accent);text-align:right;margin-top:4px}

/* STATUS */
.status-btns{display:flex;gap:6px}
.status-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;font-family:var(--sans);transition:all .15s}
.status-btn.active-pend{background:rgba(245,158,11,.15);border-color:var(--accent);color:var(--accent)}
.status-btn.active-comp{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.status-btn.active-fin{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-cancel:hover{color:var(--text);border-color:var(--text3)}
.btn-save{flex:2;padding:10px;background:var(--accent);border:none;border-radius:var(--radius);color:#000;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent2)}

/* CHARTS */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{width:30px;height:30px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.month-nav button:hover{background:var(--border)}
.month-label{font-family:var(--mono);font-size:13px;font-weight:500;min-width:150px;text-align:center}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.summary-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.summary-box .s-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.summary-box .s-value{font-family:var(--mono);font-size:16px;font-weight:600}
.summary-box .s-count{font-size:11px;color:var(--text2);margin-top:4px}
.summary-box.red{border-left:3px solid var(--red)}.summary-box.red .s-value{color:var(--red)}
.summary-box.amber{border-left:3px solid var(--accent)}.summary-box.amber .s-value{color:var(--accent)}
.summary-box.green{border-left:3px solid var(--green)}.summary-box.green .s-value{color:var(--green)}
.bar-section-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.bars-container{display:flex;gap:20px;align-items:flex-end;height:180px;margin-bottom:0}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar-val{font-family:var(--mono);font-size:11px;font-weight:500}
.bar-body{width:100%;border-radius:6px 6px 0 0;min-height:4px}
.bar-axis{display:flex;gap:20px;border-top:1px solid var(--border);padding-top:8px;margin-top:0}
.bar-name{flex:1;font-size:11px;color:var(--text2);text-align:center}

/* DONUT */
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:40px;padding:20px 0;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:14px}
.legend-row{display:flex;align-items:center;gap:10px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:13px;font-weight:500}
.legend-count{font-family:var(--mono);font-size:12px;color:var(--text2);margin-top:1px}

/* CADASTROS TAB */
.cadastros-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cad-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.cad-title{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.btn-cad-add{padding:4px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--accent);font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:500}
.btn-cad-add:hover{background:var(--border)}
.cad-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;gap:8px}
.cad-item-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cad-item-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-size:13px;font-family:var(--sans);padding:2px 4px;outline:none}
.cad-actions{display:flex;gap:4px;flex-shrink:0}
.btn-icon{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{background:var(--border)}
.btn-icon.del:hover{background:rgba(239,68,68,.15);border-color:var(--red)}
.btn-icon.save{border-color:var(--green);color:var(--green)}
.btn-icon.save:hover{background:rgba(16,185,129,.1)}
.cad-empty{font-size:12px;color:var(--text3);text-align:center;padding:12px 0}

/* INLINE ADD */
.cad-add-row{display:flex;gap:6px;margin-top:8px}
.cad-add-row input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-size:13px;font-family:var(--sans)}
.cad-add-row input:focus{outline:none;border-color:var(--accent)}
.btn-cad-save{padding:7px 12px;background:var(--accent);border:none;border-radius:var(--radius);color:#000;font-size:12px;font-weight:600;cursor:pointer}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:700px){
  .cadastros-grid{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:1fr}
  .items-input-row{flex-wrap:wrap}
  .items-input-row .price-input{width:100%}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spin"></div>
  <p>Conectando ao banco de dados...</p>
</div>

<div class="app-header">
  <div class="app-title">🔧 COMPRAS <span>/ Câmbio</span></div>
  <div class="header-right">
    <div class="sync-dot" id="sync-dot" title="Sincronizado"></div>
    <button class="btn-new" onclick="openModal()">+ Nova compra</button>
  </div>
</div>

<div class="tabs-wrap">
  <button class="tab-btn active" onclick="switchTab('pendente',this)">Pendente <span class="tab-count" id="cnt-pendente">0</span></button>
  <button class="tab-btn" onclick="switchTab('comprado',this)">Comprado <span class="tab-count" id="cnt-comprado">0</span></button>
  <button class="tab-btn" onclick="switchTab('finalizado',this)">Finalizado <span class="tab-count" id="cnt-finalizado">0</span></button>
  <button class="tab-btn" onclick="switchTab('graficos',this)">📊 Resumo Peças</button>
  <button class="tab-btn" onclick="switchTab('frete',this)">🚚 Resumo Frete</button>
  <button class="tab-btn" onclick="switchTab('donut',this)">🍩 Pedidos</button>
  <button class="tab-btn" onclick="switchTab('cadastros',this)">⚙️ Cadastros</button>
</div>

<div class="content">

  <!-- PENDENTE -->
  <div class="section active" id="sec-pendente">
    <div class="urg-pills" id="pills-pendente"></div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="Buscar por O.S, cliente, item..." id="search-pendente" oninput="renderList('pendente')"></div>
    <div id="list-pendente"></div>
  </div>

  <!-- COMPRADO -->
  <div class="section" id="sec-comprado">
    <div class="urg-pills" id="pills-comprado"></div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="Buscar por O.S, cliente, item..." id="search-comprado" oninput="renderList('comprado')"></div>
    <div id="list-comprado"></div>
  </div>

  <!-- FINALIZADO -->
  <div class="section" id="sec-finalizado">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <div class="urg-pills" id="pills-finalizado" style="margin-bottom:0;flex:1"></div>
      <input type="month" id="filter-month" onchange="renderList('finalizado')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--sans)">
    </div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="Buscar por O.S, cliente, item..." id="search-finalizado" oninput="renderList('finalizado')"></div>
    <div id="list-finalizado"></div>
  </div>

  <!-- GRÁFICO PEÇAS -->
  <div class="section" id="sec-graficos">
    <div class="chart-card">
      <div class="chart-header">
        <div class="month-nav">
          <button onclick="changeMonth('graficos',-1)">‹</button>
          <div class="month-label" id="chart-month-lbl-graficos"></div>
          <button onclick="changeMonth('graficos',1)">›</button>
        </div>
      </div>
      <div class="summary-grid" id="summary-grid-graficos"></div>
      <div class="bar-section-title">Total em peças por urgência no mês</div>
      <div class="bars-container" id="bars-container-graficos"></div>
      <div class="bar-axis" id="bars-axis-graficos"></div>
    </div>
  </div>

  <!-- GRÁFICO FRETE -->
  <div class="section" id="sec-frete">
    <div class="chart-card">
      <div class="chart-header">
        <div class="month-nav">
          <button onclick="changeMonth('frete',-1)">‹</button>
          <div class="month-label" id="chart-month-lbl-frete"></div>
          <button onclick="changeMonth('frete',1)">›</button>
        </div>
      </div>
      <div class="summary-grid" id="summary-grid-frete"></div>
      <div class="bar-section-title">Total de frete por urgência no mês</div>
      <div class="bars-container" id="bars-container-frete"></div>
      <div class="bar-axis" id="bars-axis-frete"></div>
    </div>
  </div>

  <!-- DONUT -->
  <div class="section" id="sec-donut">
    <div class="chart-card">
      <div class="bar-section-title" style="margin-bottom:8px">Pedidos por etapa</div>
      <div class="donut-wrap">
        <svg id="donut-svg" width="200" height="200" viewBox="0 0 200 200"></svg>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>
  </div>

  <!-- CADASTROS -->
  <div class="section" id="sec-cadastros">
    <div class="cadastros-grid">
      <div class="cad-section">
        <div class="cad-title">👤 Solicitantes <button class="btn-cad-add" onclick="showAddRow('sol')">+ Novo</button></div>
        <div id="list-sol"></div>
        <div class="cad-add-row" id="add-row-sol" style="display:none">
          <input type="text" id="add-input-sol" placeholder="Nome do solicitante" onkeydown="if(event.key==='Enter')saveNew('sol')">

<!-- Firebase v9 compat (UMD — funciona direto no HTML sem bundler) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

<script>
// ── FIREBASE CONFIG ────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCHUSjDVtoztWHaSkINsoI7EcYXoI1xt0o",
  authDomain: "compras-intercambio.firebaseapp.com",
  projectId: "compras-intercambio",
  storageBucket: "compras-intercambio.firebasestorage.app",
  messagingSenderId: "1007834002086",
  appId: "1:1007834002086:web:d1e112adf5d16e1473ba67",
  measurementId: "G-S1BQ1WW3C3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── STATE ──────────────────────────────────────────────────────────────────
let orders = [];
let cadData = { sol: [], cli: [], forn: [], modelo: [] };
let editId = null;
let currentItems = [];
let selectedStatus = 'pendente';
let activeFilters = { pendente: 'all', comprado: 'all', finalizado: 'all' };
let chartMonths = { graficos: new Date(), frete: new Date() };
let activeTab = 'pendente';

// ── FORMAT ─────────────────────────────────────────────────────────────────
const fmtBRL = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

// ── SYNC INDICATOR ─────────────────────────────────────────────────────────
function setSyncing(v){ document.getElementById('sync-dot').className='sync-dot'+(v?' syncing':''); }
function setOffline(){ document.getElementById('sync-dot').className='sync-dot offline'; }

// ── FIREBASE LISTENERS ─────────────────────────────────────────────────────
function initListeners() {
  // Orders — realtime
  db.collection('orders').orderBy('createdAt','desc').onSnapshot(snap => {
    orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateBadges();
    renderAll();
    if (activeTab === 'graficos') renderChart('graficos');
    else if (activeTab === 'frete') renderChart('frete');
    else if (activeTab === 'donut') renderDonut();
  }, err => { console.error(err); setOffline(); });

  // Cadastros — realtime
  ['sol','cli','forn','modelo'].forEach(key => {
    db.collection('cad_'+key).orderBy('name').onSnapshot(snap => {
      cadData[key] = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
      if (activeTab === 'cadastros') renderCadList(key);
    });
  });

  document.getElementById('loading-screen').style.display = 'none';
}

// ── TABS ───────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  el.classList.add('active');
  if (name === 'graficos') renderChart('graficos');
  else if (name === 'frete') renderChart('frete');
  else if (name === 'donut') renderDonut();
  else if (name === 'cadastros') { ['sol','cli','forn','modelo'].forEach(renderCadList); }
  else { buildPills(name); renderList(name); }
}

// ── PILLS ──────────────────────────────────────────────────────────────────
function buildPills(status) {
  const c = document.getElementById('pills-'+status);
  if (!c) return;
  const a = activeFilters[status];
  c.innerHTML = `
    <button class="urg-pill all ${a==='all'?'active':''}" onclick="setFilter('${status}','all')">Todos</button>
    <button class="urg-pill hoje ${a==='hoje'?'active':''}" onclick="setFilter('${status}','hoje')"><span class="pill-dot" style="background:var(--red)"></span>Urgente hoje</button>
    <button class="urg-pill urgente ${a==='urgente'?'active':''}" onclick="setFilter('${status}','urgente')"><span class="pill-dot" style="background:var(--accent)"></span>Urgente</button>
    <button class="urg-pill sem ${a==='sem'?'active':''}" onclick="setFilter('${status}','sem')"><span class="pill-dot" style="background:var(--green)"></span>Sem urgência</button>`;
}
function setFilter(status, val) { activeFilters[status]=val; buildPills(status); renderList(status); }

// ── BADGES ─────────────────────────────────────────────────────────────────
function updateBadges() {
  ['pendente','comprado','finalizado'].forEach(s => {
    const el = document.getElementById('cnt-'+s);
    if (el) el.textContent = orders.filter(o => o.status===s).length;
  });
}

// ── LIST ───────────────────────────────────────────────────────────────────
function renderList(status) {
  const container = document.getElementById('list-'+status);
  if (!container) return;
  let list = orders.filter(o => o.status===status);
  const f = activeFilters[status];
  if (f==='hoje') list = list.filter(o => o.urgencia==='URGENTE HOJE');
  else if (f==='urgente') list = list.filter(o => o.urgencia==='URGENTE');
  else if (f==='sem') list = list.filter(o => o.urgencia==='SEM URGÊNCIA');
  if (status==='finalizado') {
    const mf = document.getElementById('filter-month');
    if (mf && mf.value) list = list.filter(o => (o.data||'').startsWith(mf.value));
  }
  const se = document.getElementById('search-'+status);
  if (se && se.value.trim()) {
    const q = se.value.trim().toLowerCase();
    list = list.filter(o =>
      (o.os||'').toLowerCase().includes(q) ||
      (o.cliente||'').toLowerCase().includes(q) ||
      (o.solicitante||'').toLowerCase().includes(q) ||
      (o.itens||[]).map(i=>i.name||i).join(' ').toLowerCase().includes(q) ||
      (o.fornecedor||'').toLowerCase().includes(q) ||
      (o.modelo||'').toLowerCase().includes(q)
    );
  }
  const urgOrder = {'URGENTE HOJE':0,'URGENTE':1,'SEM URGÊNCIA':2};
  list.sort((a,b) => (urgOrder[a.urgencia]??3)-(urgOrder[b.urgencia]??3));
  if (!list.length) { container.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>Nenhum pedido aqui ainda.</p></div>'; return; }

  container.innerHTML = list.map(o => {
    const urgClass = o.urgencia==='URGENTE HOJE'?'hoje': o.urgencia==='URGENTE'?'urgente':'sem';
    const totalVal = parseFloat(o.valor||0) + parseFloat(o.frete||0);
    const hasFrete = parseFloat(o.frete||0) > 0;
    const itensHtml = (o.itens && o.itens.length)
      ? '<div class="order-items">'+o.itens.map(i=>`<span class="item-tag">${typeof i==='object'?i.name:i}${(typeof i==='object'&&i.price)?` <span style="color:var(--accent);font-size:10px">R$${parseFloat(i.price).toFixed(2)}</span>`:''}</span>`).join('')+'</div>' : '';
    const advance = status==='pendente' ? `<button class="action-btn advance" onclick="moveOrder('${o.id}','comprado')">→ Marcar comprado</button>`
      : status==='comprado' ? `<button class="action-btn finish" onclick="moveOrder('${o.id}','finalizado')">✓ Finalizar</button>` : '';
    const back = status==='comprado' ? `<button class="action-btn back" onclick="moveOrder('${o.id}','pendente')">← Pendente</button>`
      : status==='finalizado' ? `<button class="action-btn back" onclick="moveOrder('${o.id}','comprado')">← Comprado</button>` : '';

    return `<div class="order-card urg-${urgClass}">
      <div class="order-top">
        <div class="order-main">
          <div class="order-company">🚛 ${o.cliente||'—'} <span class="urg-badge ${urgClass}">${o.urgencia||'—'}</span></div>
          <div class="order-meta">
            <span>📋 OS: <strong>${o.os||'—'}</strong></span>
            <span>👤 ${o.solicitante||'—'}</span>
            ${o.modelo?`<span>⚙️ ${o.modelo}</span>`:''}
            ${o.fornecedor?`<span>🏭 ${o.fornecedor}</span>`:''}
          </div>
          ${itensHtml}
          ${o.obs?`<div class="order-obs">📝 ${o.obs}</div>`:''}
          ${hasFrete?`<div class="frete-info">Frete: ${fmtBRL(o.frete)}</div>`:''}
        </div>
        <div class="order-right">
          <div class="order-value">${fmtBRL(totalVal)}</div>
          <div class="order-date">${fmtDate(o.data)}</div>
        </div>
      </div>
      <div class="order-actions">
        ${advance}${back}
        <button class="action-btn" onclick="openModal('${o.id}')">✏️ Editar</button>
        <button class="action-btn del" onclick="deleteOrder('${o.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  ['pendente','comprado','finalizado'].forEach(s => { buildPills(s); renderList(s); });
}

// ── MOVE / DELETE ──────────────────────────────────────────────────────────
async function moveOrder(id, newStatus) {
  setSyncing(true);
  await db.collection('orders').doc(id).update({ status: newStatus });
  setSyncing(false);
}
async function deleteOrder(id) {
  if (!confirm('Excluir este pedido?')) return;
  setSyncing(true);
  await db.collection('orders').doc(id).delete();
  setSyncing(false);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function populateSelect(selId, items, selected) {
  const sel = document.getElementById(selId);
  const req = selId==='f-solicitante'||selId==='f-cliente';
  sel.innerHTML = `<option value="">${req?'Selecione...':'Nenhum'}</option>` +
    items.map(v=>`<option value="${v}"${v===selected?' selected':''}>${v}</option>`).join('') +
    `<option value="__new__">+ Cadastrar novo...</option>`;
}
function handleNew(sel, key) {
  const inp = document.getElementById('f-'+key+'-new');
  inp.style.display = sel.value==='__new__'?'block':'none';
  if (sel.value==='__new__') inp.focus();
}
function resolveSelect(selId, newId) {
  const sel = document.getElementById(selId);
  if (sel.value==='__new__') {
    const nv = document.getElementById(newId).value.trim();
    if (!nv) return null;
    // Save to Firebase (async, no await needed — listener will update)
    const key = newId.replace('f-','').replace('-new','');
    db.collection('cad_'+key).add({ name: nv });
    return nv;
  }
  return sel.value || '';
}

function openModal(id) {
  editId = id || null;
  currentItems = [];
  const o = id ? orders.find(x => x.id===id) : {};
  document.getElementById('modal-title').textContent = id ? 'EDITAR COMPRA' : 'NOVA COMPRA';
  document.getElementById('f-data').value = o.data || new Date().toISOString().slice(0,10);
  document.getElementById('f-os').value = o.os || '';
  document.getElementById('f-frete').value = o.frete || '';
  document.getElementById('f-valor').value = o.valor || '';
  document.getElementById('f-urgencia').value = o.urgencia || '';
  document.getElementById('f-obs').value = o.obs || '';
  populateSelect('f-solicitante', cadData.sol.map(x=>x.name), o.solicitante);
  populateSelect('f-cliente', cadData.cli.map(x=>x.name), o.cliente);
  populateSelect('f-fornecedor', cadData.forn.map(x=>x.name), o.fornecedor);
  populateSelect('f-modelo', cadData.modelo.map(x=>x.name), o.modelo);
  ['sol','cli','forn','modelo'].forEach(k => { document.getElementById('f-'+k+'-new').style.display='none'; });
  currentItems = o.itens ? o.itens.map(i => typeof i==='object'?i:{name:i,price:0}) : [];
  renderItemTags();
  setStatus(o.status || 'pendente');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editId=null; }

function setStatus(s) {
  selectedStatus = s;
  document.getElementById('sb-pendente').className='status-btn'+(s==='pendente'?' active-pend':'');
  document.getElementById('sb-comprado').className='status-btn'+(s==='comprado'?' active-comp':'');
  document.getElementById('sb-finalizado').className='status-btn'+(s==='finalizado'?' active-fin':'');
}

// ── ITEMS ──────────────────────────────────────────────────────────────────
function addItem() {
  const nameEl = document.getElementById('item-input');
  const priceEl = document.getElementById('item-price');
  const name = nameEl.value.trim();
  if (!name) return;
  const price = parseFloat(priceEl.value) || 0;
  currentItems.push({ name, price });
  nameEl.value = ''; priceEl.value = '';
  nameEl.focus();
  renderItemTags();
  updateItemsTotal();
}
function removeItem(i) { currentItems.splice(i,1); renderItemTags(); updateItemsTotal(); }
function renderItemTags() {
  document.getElementById('items-tags').innerHTML = currentItems.map((it,i) =>
    `<span class="item-tag-form">${it.name}${it.price?`<span class="item-price">${fmtBRL(it.price)}</span>`:''}<span class="item-remove" onclick="removeItem(${i})">×</span></span>`
  ).join('');
}
function updateItemsTotal() {
  const total = currentItems.reduce((s,it) => s + parseFloat(it.price||0), 0);
  const el = document.getElementById('items-total');
  if (total > 0) {
    el.textContent = 'Total calculado: ' + fmtBRL(total);
    document.getElementById('f-valor').value = total.toFixed(2);
  } else {
    el.textContent = '';
  }
}

// ── SAVE ORDER ─────────────────────────────────────────────────────────────
async function saveOrder() {
  const gv = id => document.getElementById(id).value.trim();
  const data = gv('f-data'), os = gv('f-os'), urgencia = gv('f-urgencia');
  if (!data||!os||!urgencia) { alert('Preencha: Data, N° O.S e Urgência (*)'); return; }
  const solicitante = resolveSelect('f-solicitante','f-sol-new');
  if (!solicitante) { alert('Preencha o Solicitante.'); return; }
  const cliente = resolveSelect('f-cliente','f-cli-new');
  if (!cliente) { alert('Preencha o Cliente.'); return; }
  const fornecedor = resolveSelect('f-fornecedor','f-forn-new');
  const modelo = resolveSelect('f-modelo','f-modelo-new');

  const order = {
    data, os, solicitante, cliente,
    fornecedor: fornecedor||'',
    modelo: modelo||'',
    frete: parseFloat(gv('f-frete'))||0,
    valor: parseFloat(gv('f-valor'))||0,
    urgencia, status: selectedStatus,
    itens: [...currentItems],
    obs: gv('f-obs'),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  setSyncing(true);
  if (editId) {
    await db.collection('orders').doc(editId).update(order);
  } else {
    order.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('orders').add(order);
  }
  setSyncing(false);
  closeModal();
}

// ── CHARTS ─────────────────────────────────────────────────────────────────
function changeMonth(chart, d) {
  const cur = chartMonths[chart];
  chartMonths[chart] = new Date(cur.getFullYear(), cur.getMonth()+d, 1);
  renderChart(chart);
}

function renderChart(chart) {
  const date = chartMonths[chart];
  const y = date.getFullYear(), m = date.getMonth();
  document.getElementById('chart-month-lbl-'+chart).textContent =
    date.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const monthOrders = orders.filter(o => {
    if (!o.data) return false;
    const d = new Date(o.data+'T00:00:00');
    return d.getFullYear()===y && d.getMonth()===m;
  });

  const defs = [
    { key:'URGENTE HOJE', label:'Urgente hoje', cls:'red', color:'#ef4444' },
    { key:'URGENTE', label:'Urgente', cls:'amber', color:'#f59e0b' },
    { key:'SEM URGÊNCIA', label:'Sem urgência', cls:'green', color:'#10b981' }
  ];

  const getValue = (o) => chart==='frete' ? parseFloat(o.frete||0) : parseFloat(o.valor||0);
  const totals = defs.map(d => monthOrders.filter(o=>o.urgencia===d.key).reduce((s,o)=>s+getValue(o),0));
  const counts = defs.map(d => monthOrders.filter(o=>o.urgencia===d.key).length);
  const maxVal = Math.max(...totals, 1);

  document.getElementById('summary-grid-'+chart).innerHTML = defs.map((d,i)=>`
    <div class="summary-box ${d.cls}">
      <div class="s-label">${d.label}</div>
      <div class="s-value">${fmtBRL(totals[i])}</div>
      <div class="s-count">${counts[i]} pedido${counts[i]!==1?'s':''}</div>
    </div>`).join('');

  const barH = 160;
  document.getElementById('bars-container-'+chart).innerHTML = defs.map((d,i)=>{
    const h = totals[i]>0 ? Math.max(8, Math.round((totals[i]/maxVal)*barH)) : 4;
    return `<div class="bar-wrap">
      <div class="bar-val" style="color:${d.color}">${fmtBRL(totals[i])}</div>
      <div class="bar-body" style="height:${h}px;background:${d.color};opacity:.85"></div>
    </div>`;
  }).join('');

  document.getElementById('bars-axis-'+chart).innerHTML = defs.map(d=>`<div class="bar-name">${d.label}</div>`).join('');
}

// ── DONUT ──────────────────────────────────────────────────────────────────
function renderDonut() {
  const defs = [
    {status:'pendente',label:'Pendente',color:'#f59e0b'},
    {status:'comprado',label:'Comprado',color:'#3b82f6'},
    {status:'finalizado',label:'Finalizado',color:'#10b981'}
  ];
  const counts = defs.map(d => orders.filter(o=>o.status===d.status).length);
  const total = counts.reduce((a,b)=>a+b,0);
  const svg = document.getElementById('donut-svg');
  const cx=100,cy=100,r=80,ri=48;
  if (!total) {
    svg.innerHTML=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2e2e2e" stroke-width="${r-ri}"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#666" font-size="13">Sem dados</text>`;
    document.getElementById('donut-legend').innerHTML=''; return;
  }
  let angle=-Math.PI/2, paths='';
  defs.forEach((d,i)=>{
    if (!counts[i]) return;
    const pct=counts[i]/total, a1=angle, a2=angle+pct*2*Math.PI; angle=a2;
    const x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r,x2=cx+Math.cos(a2)*r,y2=cy+Math.sin(a2)*r;
    const ix1=cx+Math.cos(a1)*ri,iy1=cy+Math.sin(a1)*ri,ix2=cx+Math.cos(a2)*ri,iy2=cy+Math.sin(a2)*ri;
    const lg=pct>.5?1:0, lx=cx+Math.cos((a1+a2)/2)*((r+ri)/2), ly=cy+Math.sin((a1+a2)/2)*((r+ri)/2);
    paths+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ri},${ri} 0 ${lg},0 ${ix1},${iy1}Z" fill="${d.color}" stroke="#0f0f0f" stroke-width="2"/>`;
    if(Math.round(pct*100)>7) paths+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-family="IBM Plex Mono" font-weight="600">${Math.round(pct*100)}%</text>`;
  });
  paths+=`<text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#f0f0f0" font-size="22" font-family="IBM Plex Mono" font-weight="600">${total}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#666" font-size="11" font-family="IBM Plex Sans">pedidos</text>`;
  svg.innerHTML=paths;
  document.getElementById('donut-legend').innerHTML=defs.map((d,i)=>`
    <div class="legend-row">
      <div class="legend-dot" style="background:${d.color}"></div>
      <div>
        <div class="legend-label">${d.label}</div>
        <div class="legend-count">${counts[i]} pedido${counts[i]!==1?'s':''} · ${Math.round(counts[i]/total*100)}%</div>
      </div>
    </div>`).join('');
}

// ── CADASTROS ──────────────────────────────────────────────────────────────
function renderCadList(key) {
  const isModelo = key==='modelo';
  const container = document.getElementById('list-'+key);
  const items = cadData[key];
  if (!items.length) { container.innerHTML=`<div class="cad-empty">Nenhum cadastrado ainda.</div>`; return; }
  container.innerHTML = items.map(item=>`
    <div class="cad-item" id="cad-item-${key}-${item.id}">
      <span class="cad-item-name" id="cad-name-${key}-${item.id}">${item.name}</span>
      <div class="cad-actions">
        <button class="btn-icon" onclick="startEditCad('${key}','${item.id}')" title="Editar">✏️</button>
        <button class="btn-icon del" onclick="deleteCad('${key}','${item.id}')" title="Excluir">🗑</button>
      </div>
    </div>`).join('');
}

function startEditCad(key, id) {
  const nameEl = document.getElementById('cad-name-'+key+'-'+id);
  const item = cadData[key].find(x=>x.id===id);
  const actionsEl = nameEl.nextElementSibling;
  nameEl.outerHTML = `<input class="cad-item-input" id="cad-edit-${key}-${id}" value="${item.name}" onkeydown="if(event.key==='Enter')confirmEditCad('${key}','${id}')">`;
  actionsEl.innerHTML = `
    <button class="btn-icon save" onclick="confirmEditCad('${key}','${id}')">✓</button>
    <button class="btn-icon del" onclick="renderCadList('${key}')">✕</button>`;
  document.getElementById('cad-edit-'+key+'-'+id).focus();
}

async function confirmEditCad(key, id) {
  const inp = document.getElementById('cad-edit-'+key+'-'+id);
  const nv = inp.value.trim();
  if (!nv) return;
  setSyncing(true);
  await db.collection('cad_'+key).doc(id).update({ name: nv });
  setSyncing(false);
}

async function deleteCad(key, id) {
  if (!confirm('Excluir este cadastro?')) return;
  setSyncing(true);
  await db.collection('cad_'+key).doc(id).delete();
  setSyncing(false);
}

function showAddRow(key) {
  const row = document.getElementById('add-row-'+key);
  row.style.display = 'flex';
  document.getElementById('add-input-'+key).focus();
}

async function saveNew(key) {
  const inp = document.getElementById('add-input-'+key);
  const nv = inp.value.trim();
  if (!nv) return;
  setSyncing(true);
  await db.collection('cad_'+key).add({ name: nv });
  setSyncing(false);
  inp.value = '';
  document.getElementById('add-row-'+key).style.display='none';
}

// ── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const mf = document.getElementById('filter-month');
  if (mf) mf.value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  initListeners();
});
</script>
